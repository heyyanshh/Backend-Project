<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cast your vote securely with facial verification">
  <title>Vote — E-Vote System</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- face-api.js — Lightweight facial recognition (runs entirely in browser) -->
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/dist/face-api.js"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar"></aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Top Header -->
    <header class="top-header" id="top-header">
      <div class="top-header-left">
        <button class="mobile-menu-btn" onclick="toggleMobileSidebar()">☰</button>
      </div>
      <div class="top-header-right"></div>
    </header>

    <!-- Page Body -->
    <div class="page-body">
      <!-- Loading -->
      <div id="loading" class="loading-container">
        <div class="spinner"></div>
      </div>

      <!-- Voting Content -->
      <div id="voting-content" class="hidden"></div>

      <!-- Vote Success -->
      <div id="vote-success" class="hidden" style="display:none; min-height: calc(100vh - 170px); align-items: center; justify-content: center;"></div>
    </div>
  </div>

  <!-- Confirmation Modal -->
  <div id="confirm-modal" class="modal-overlay" style="display: none;"></div>

  <!-- Face Verification Modal -->
  <div id="face-modal" class="modal-overlay" style="display: none;"></div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/vote.js"></script>
</body>
</html>
