<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to E-Vote — Secure Electronic Voting System">
  <title>Login — E-Vote System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container animate-fade-in-up">
      <!-- Header -->
      <div class="auth-header">
        <div class="auth-icon">🛡️</div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your E-Vote account</p>
      </div>

      <!-- Form Card -->
      <div class="auth-form">
        <form id="login-form">
          <div class="form-group">
            <label for="login-email">Email Address</label>
            <div class="input-with-icon">
              <span class="input-icon">📧</span>
              <input type="email" id="login-email" class="input-field" placeholder="voter@example.com" required>
            </div>
          </div>

          <div class="form-group">
            <label for="login-password">Password</label>
            <div class="input-with-icon">
              <span class="input-icon">🔒</span>
              <input type="password" id="login-password" class="input-field" placeholder="••••••••" required minlength="6">
            </div>
          </div>

          <button type="submit" id="login-submit" class="btn-primary w-full mt-2">
            Sign In
          </button>
        </form>

        <div class="text-center mt-6">
          <p class="text-sm" style="color: var(--text-muted);">
            Don't have an account?
            <a href="/register.html" style="color: var(--primary-500); font-weight: 600;">Register here</a>
          </p>
        </div>

        <!-- Demo Credentials -->
        <div class="demo-credentials">
          <p class="demo-credentials-title">Demo Admin Credentials</p>
          <p>Email: <span>admin@evote.com</span></p>
          <p>Password: <span>Admin@123</span></p>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
